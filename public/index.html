<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>电缆工程AI专家助手</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
      background: #0b1120;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .container {
      max-width: 960px;
      width: 100%;
      background: #1a2332;
      border-radius: 32px;
      padding: 40px;
      box-shadow: 0 25px 50px -10px rgba(0,0,0,0.8);
      border: 1px solid #2d3a4f;
    }
    h1 {
      font-size: 28px;
      font-weight: 600;
      color: #e8edf5;
      letter-spacing: -0.3px;
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
    }
    .badge {
      background: #2d8cf0;
      font-size: 14px;
      padding: 4px 14px;
      border-radius: 40px;
      color: #fff;
      font-weight: 500;
    }
    .sub {
      color: #8896b0;
      margin-bottom: 30px;
      font-size: 15px;
      border-left: 3px solid #2d8cf0;
      padding-left: 16px;
    }
    textarea {
      width: 100%;
      height: 180px;
      background: #0f1729;
      border: 1px solid #2d3a4f;
      border-radius: 16px;
      color: #e8edf5;
      font-size: 15px;
      padding: 18px 20px;
      resize: vertical;
      font-family: 'Consolas', 'Courier New', monospace;
      transition: border 0.2s;
    }
    textarea:focus {
      outline: none;
      border-color: #2d8cf0;
      box-shadow: 0 0 0 3px rgba(45, 140, 240, 0.15);
    }
    textarea::placeholder {
      color: #4a5a78;
    }
    .action-bar {
      display: flex;
      gap: 14px;
      margin: 20px 0 16px;
      flex-wrap: wrap;
      align-items: center;
    }
    .btn {
      background: #2d8cf0;
      border: none;
      color: #fff;
      font-weight: 600;
      font-size: 16px;
      padding: 12px 36px;
      border-radius: 40px;
      cursor: pointer;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid #3b9aff;
    }
    .btn:hover { background: #3b9aff; transform: scale(1.01); }
    .btn:disabled { opacity: 0.4; pointer-events: none; filter: grayscale(0.6); }
    .btn-outline {
      background: transparent;
      border: 1px solid #3d4d69;
      color: #b0c2df;
    }
    .btn-outline:hover { background: #1f2b3e; border-color: #5a6f92; }
    .file-label {
      background: transparent;
      border: 1px dashed #3d4d69;
      padding: 10px 24px;
      border-radius: 40px;
      color: #b0c2df;
      cursor: pointer;
      font-size: 14px;
      transition: 0.2s;
    }
    .file-label:hover { border-color: #2d8cf0; color: #e8edf5; }
    #fileInput { display: none; }
    .loader {
      display: none;
      margin-left: 12px;
      color: #8896b0;
    }
    .loader.active { display: inline-block; }
    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid #2d3a4f;
      border-top-color: #2d8cf0;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .result-area {
      margin-top: 28px;
      background: #0f1729;
      border-radius: 20px;
      padding: 28px 30px;
      border: 1px solid #263244;
      white-space: pre-wrap;
      word-wrap: break-word;
      font-family: 'Segoe UI', system-ui, sans-serif;
      line-height: 1.7;
      color: #d6dfed;
      min-height: 120px;
      transition: 0.3s;
    }
    .result-area:empty::before {
      content: "等待输入...";
      color: #3d4d69;
      font-style: italic;
    }
    .result-area strong { color: #f0c27f; }
    .error-box {
      background: #2a1520;
      border-left: 4px solid #f04747;
      padding: 16px 20px;
      border-radius: 12px;
      color: #f7b2b2;
    }
    .footer-tip {
      margin-top: 20px;
      color: #4a5a78;
      font-size: 13px;
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }
    .footer-tip span { background: #141e2d; padding: 4px 14px; border-radius: 30px; }
    @media (max-width: 640px) {
      .container { padding: 20px; }
      .action-bar { flex-direction: column; align-items: stretch; }
      .btn { justify-content: center; }
    }
  </style>
</head>
<body>

<div class="container">
  <h1>
    ⚡ 电缆工程AI专家
    <span class="badge">v1.0</span>
  </h1>
  <div class="sub">
    型号识别 · 结构拆解 · 国标转换 · 清单审核 · 选型建议
  </div>

  <textarea id="inputArea" placeholder="请粘贴电缆型号、BOQ清单内容或技术描述。例如：&#10;CU/XLPE/IS+OS/PVC/SWA/PVC 0.6/1kV 3×240+1×120&#10;或上传 .txt / .csv 文件（点击下方按钮）"></textarea>

  <div class="action-bar">
    <button class="btn" id="submitBtn">🚀 生成分析</button>
    <label class="file-label" for="fileInput">📎 上传文本文件</label>
    <input type="file" id="fileInput" accept=".txt,.csv,.log" />
    <span class="loader" id="loader"><span class="spinner"></span>AI 处理中...</span>
  </div>

  <div class="result-area" id="resultArea"></div>

  <div class="footer-tip">
    <span>🔒 密钥仅存后端，安全隔离</span>
    <span>📋 自动检测参数冲突</span>
    <span>🧠 支持动态学习新规则</span>
  </div>
</div>

<script>
  const inputArea = document.getElementById('inputArea');
  const submitBtn = document.getElementById('submitBtn');
  const resultArea = document.getElementById('resultArea');
  const loader = document.getElementById('loader');
  const fileInput = document.getElementById('fileInput');

  // 提交处理
  async function handleSubmit() {
    const content = inputArea.value.trim();
    if (!content) {
      resultArea.innerHTML = '<div class="error-box">⚠️ 请先输入电缆型号或技术要求</div>';
      return;
    }

    submitBtn.disabled = true;
    loader.classList.add('active');
    resultArea.innerHTML = '';

    try {
      const response = await fetch('/api/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userInput: content })
      });

      const data = await response.json();
      if (data.success) {
        // 保留换行和格式
        resultArea.innerHTML = data.result.replace(/\n/g, '<br />');
      } else {
        resultArea.innerHTML = `<div class="error-box">❌ 错误：${data.error || '未知错误'}</div>`;
      }
    } catch (err) {
      resultArea.innerHTML = `<div class="error-box">❌ 网络请求失败：${err.message}</div>`;
    } finally {
      submitBtn.disabled = false;
      loader.classList.remove('active');
    }
  }

  // 监听按钮点击
  submitBtn.addEventListener('click', handleSubmit);

  // 支持 Ctrl+Enter 快捷键提交
  inputArea.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
      e.preventDefault();
      handleSubmit();
    }
  });

  // 文件上传：读取文本内容填入输入框
  fileInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      inputArea.value = ev.target.result;
      // 自动提交
      handleSubmit();
    };
    reader.onerror = () => {
      resultArea.innerHTML = '<div class="error-box">❌ 文件读取失败，请检查格式</div>';
    };
    reader.readAsText(file, 'UTF-8');
    // 重置input以便重复上传同一文件
    fileInput.value = '';
  });
</script>

</body>
</html>
